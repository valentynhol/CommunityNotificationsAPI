name: Deploy to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add remote host to known_hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy and Setup Environment
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          # 1. Transfer the code via rsync
          rsync -avz --exclude='.git' -e "ssh -o StrictHostKeyChecking=no" ./ $SERVER_USER@$SERVER_IP:~/notifications-api

          # 2. Copy .env, setup Virtual Environment, and Start App
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP "cd ~/notifications-api && \
          cp ~/secrets/.env ~/notifications-api/.env && \
          if [ ! -d \"venv\" ]; then python3 -m venv venv; fi && \
          ./venv/bin/pip install -r requirements.txt && \
          export GOOGLE_APPLICATION_CREDENTIALS=\"/home/$SERVER_USER/secrets/firebase_key.json\" && \
          ./venv/bin/python manage.py migrate && \
          ./venv/bin/python manage.py collectstatic --noinput && \
          if [ -f gunicorn.pid ]; then kill \$(cat gunicorn.pid) > /dev/null 2>&1 || true; fi && \
          ./venv/bin/gunicorn ApiCore.wsgi:application --bind 127.0.0.1:8000 --pid gunicorn.pid --daemon > /dev/null 2>&1"